name: Rolling batch

# Fires hourly. Hits the Render-hosted backend's HMAC-protected batch webhook,
# which iterates every user and runs the timezone-aware per-user pipeline: a
# user's brief is generated when THEIR local morning arrives (parse local
# yesterday → graph → maintenance → brief). Hourly ticks outside a user's local
# morning are cheap no-ops (idempotent via parse_log / morning_brief_log).
#
# Required repo secrets:
#   RENDER_URL            — https://<your-service>.onrender.com
#   BATCH_WEBHOOK_SECRET  — same string set as BATCH_WEBHOOK_SECRET on Render
#
# Manual runs are also allowed via the Actions UI (workflow_dispatch).
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: POST /api/admin/run-batch
        run: |
          set -euo pipefail
          response=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "X-Webhook-Secret: ${{ secrets.BATCH_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.RENDER_URL }}/api/admin/run-batch")
          body=$(echo "$response" | sed '$d')
          status=$(echo "$response" | tail -n1)
          echo "HTTP $status"
          echo "$body" | head -c 4000
          if [ "$status" != "200" ]; then
            echo "batch webhook returned non-200" >&2
            exit 1
          fi

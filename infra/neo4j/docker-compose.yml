# Self-hosted Neo4j Community 5 + APOC + Caddy (TLS termination).
#
# Deploy target: a small VPS (Hetzner CX22 €4.51/mo, or Oracle Cloud Free
# Tier ARM box). See infra/neo4j/README.md for the full provisioning runbook.
#
# Network exposure:
#   :443  Caddy → reverse-proxies Bolt-over-WSS (wss://neo4j.yourdomain/) to
#         the local Neo4j on 7687
#   :80   Caddy → ACME HTTP-01 challenge for the LE cert
# Only 22 (SSH) + 80 + 443 should be open in the firewall.
#
# Volumes are bind-mounted so backups are trivial. Note: the multi-tenant
# graph is rebuildable from Postgres via `python -m app.graph_rebuild --all`,
# so volume backups are not strictly required.

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: mindforge-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_default__listen__address=0.0.0.0
      # Tune for a 4 GB CX22; ~1.5 GB heap leaves room for OS + Caddy.
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1536m
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - ./data:/data
      - ./logs:/logs
    # Bolt + HTTP are bound only to localhost; Caddy reaches them via the
    # docker network. No external exposure of 7687/7474.
    expose:
      - "7687"
      - "7474"

  caddy:
    image: caddy:2-alpine
    container_name: mindforge-caddy
    restart: unless-stopped
    depends_on:
      - neo4j
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - NEO4J_HOSTNAME=${NEO4J_HOSTNAME:?set NEO4J_HOSTNAME in .env}

volumes:
  caddy-data:
  caddy-config:
